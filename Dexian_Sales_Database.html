<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dexian Intelligence — Sales Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --navy-950:#0a1128;
  --navy-900:#0f1c3f;
  --navy-800:#152a56;
  --navy-700:#1c3a72;
  --navy-600:#274b8f;
  --navy-500:#3562b8;
  --navy-100:#e8edf9;
  --navy-50:#f4f7fd;
  --ink:#12172b;
  --ink-soft:#4a5170;
  --ink-faint:#8890ab;
  --line:#e7eaf3;
  --white:#ffffff;
  --bg:#f7f8fc;
  --good:#1a8f5e;
  --warn:#b3730d;
  --bad:#c23b3b;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow-sm:0 1px 2px rgba(15,28,63,.05), 0 1px 1px rgba(15,28,63,.03);
  --shadow-md:0 8px 24px rgba(15,28,63,.08), 0 2px 6px rgba(15,28,63,.04);
  --shadow-lg:0 20px 50px rgba(15,28,63,.14), 0 6px 16px rgba(15,28,63,.06);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Inter","SF Pro Text",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
#app{display:flex; min-height:100vh;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#d7dcec;border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:236px; flex:0 0 236px;
  background:var(--navy-950);
  color:#dfe6f7;
  padding:22px 16px;
  position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; gap:22px;
}
.brand{display:flex; align-items:center; gap:10px; padding:0 6px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--navy-500),var(--navy-700));
  display:flex;align-items:center;justify-content:center;
  font-weight:700; font-size:15px; color:#fff; letter-spacing:-.02em;
  box-shadow:var(--shadow-sm);
}
.brand-name{font-weight:650; font-size:15px; color:#fff; letter-spacing:-.01em;}
.brand-sub{font-size:11px; color:#8b96bd; margin-top:1px;}

.nav{display:flex; flex-direction:column; gap:2px; margin-top:4px;}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:10px;
  color:#b7c1e2; font-size:13.5px; font-weight:500;
  cursor:pointer; transition:background .15s ease, color .15s ease;
  border:none; background:none; text-align:left; width:100%;
}
.nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
.nav-item.active{background:rgba(53,98,184,.35); color:#fff;}
.nav-item svg{width:16px;height:16px; flex:0 0 auto; opacity:.9;}

.sidebar-footer{margin-top:auto; padding:10px 6px; font-size:11px; color:#6b7699; line-height:1.5;}

/* ---------- Main ---------- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  position:sticky; top:0; z-index:20;
  background:rgba(247,248,252,.86); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:14px 28px; display:flex; align-items:center; gap:16px;
}
.page-title{font-size:19px; font-weight:650; letter-spacing:-.01em; color:var(--ink); margin:0;}
.search-wrap{flex:1; max-width:460px; position:relative; margin-left:12px;}
.search-input{
  width:100%; padding:9px 14px 9px 36px; border-radius:10px; border:1px solid var(--line);
  background:#fff; font-size:13.5px; color:var(--ink); outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
.search-input:focus{border-color:var(--navy-500); box-shadow:0 0 0 3px rgba(53,98,184,.14);}
.search-icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--ink-faint);}
.content{padding:26px 28px 60px; flex:1;}

/* ---------- Stat cards ---------- */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:22px;}
.stat-card{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:18px 20px; box-shadow:var(--shadow-sm);
  transition:box-shadow .2s ease, transform .2s ease;
}
.stat-card:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
.stat-label{font-size:12px; color:var(--ink-faint); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
.stat-value{font-size:28px; font-weight:700; color:var(--navy-900); margin-top:6px; letter-spacing:-.02em;}
.stat-sub{font-size:12px; color:var(--ink-soft); margin-top:4px;}

/* ---------- Panels / cards ---------- */
.panel{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:20px 22px; box-shadow:var(--shadow-sm); margin-bottom:18px;
}
.panel-title{font-size:14.5px; font-weight:650; color:var(--ink); margin:0 0 14px; display:flex; align-items:center; justify-content:space-between;}
.grid-2{display:grid; grid-template-columns:1.3fr 1fr; gap:18px;}
.grid-2col{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media (max-width:980px){.grid-2, .grid-2col{grid-template-columns:1fr;}}

/* ---------- Layout: directory ---------- */
.directory-layout{display:grid; grid-template-columns:250px 1fr; gap:20px; align-items:start;}
@media (max-width:900px){.directory-layout{grid-template-columns:1fr;}}
.filters-panel{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:18px; box-shadow:var(--shadow-sm); position:sticky; top:78px;
  max-height:calc(100vh - 100px); overflow-y:auto;
}
.filter-group{margin-bottom:16px;}
.filter-label{font-size:11.5px; font-weight:650; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; display:block;}
.filter-select, .filter-input{
  width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--line);
  background:#fbfcfe; font-size:13px; color:var(--ink); outline:none;
}
.filter-select:focus, .filter-input:focus{border-color:var(--navy-500);}
.chip-row{display:flex; flex-wrap:wrap; gap:6px;}
.chip{
  padding:5px 10px; border-radius:999px; font-size:12px; font-weight:500;
  border:1px solid var(--line); color:var(--ink-soft); cursor:pointer; background:#fff;
  transition:all .15s ease;
}
.chip:hover{border-color:var(--navy-500); color:var(--navy-700);}
.chip.active{background:var(--navy-900); color:#fff; border-color:var(--navy-900);}
.clear-filters{font-size:12px; color:var(--navy-600); cursor:pointer; font-weight:600; background:none; border:none; padding:0;}
.clear-filters:hover{text-decoration:underline;}

.toolbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:12px; flex-wrap:wrap;}
.result-count{font-size:13px; color:var(--ink-soft);}
.view-toggle{display:flex; background:#eef1f9; border-radius:10px; padding:3px; gap:2px;}
.view-toggle button{
  border:none; background:none; padding:6px 14px; font-size:12.5px; font-weight:600; color:var(--ink-soft);
  border-radius:8px; cursor:pointer;
}
.view-toggle button.active{background:#fff; color:var(--navy-800); box-shadow:var(--shadow-sm);}

.company-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
.company-card{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:16px 18px; box-shadow:var(--shadow-sm); cursor:pointer;
  transition:box-shadow .18s ease, transform .18s ease, border-color .18s ease;
  display:flex; flex-direction:column; gap:10px;
}
.company-card:hover{box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:#cbd6ee;}
.card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
.card-name{font-size:14.5px; font-weight:650; color:var(--ink); line-height:1.3;}
.card-industry{font-size:11.5px; color:var(--navy-600); font-weight:600; margin-top:3px;}
.priority-badge{
  flex:0 0 auto; width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff;
}
.card-meta{display:flex; flex-wrap:wrap; gap:6px; font-size:11.5px; color:var(--ink-soft);}
.meta-pill{background:var(--navy-50); border-radius:6px; padding:3px 8px; color:var(--navy-700); font-weight:500;}
.card-desc{font-size:12.5px; color:var(--ink-soft); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.card-tags{display:flex; flex-wrap:wrap; gap:5px;}
.tag{font-size:10.5px; padding:2px 7px; border-radius:6px; background:#eef1f9; color:var(--navy-700); font-weight:600;}

/* ---------- Table view ---------- */
.table-wrap{background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg); overflow:auto; box-shadow:var(--shadow-sm);}
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{
  position:sticky; top:0; background:#fafbfe; text-align:left; padding:11px 14px; font-size:11px;
  font-weight:650; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.03em; border-bottom:1px solid var(--line); white-space:nowrap;
}
tbody td{padding:11px 14px; border-bottom:1px solid #f0f2f8; color:var(--ink-soft); white-space:nowrap;}
tbody tr{cursor:pointer; transition:background .12s ease;}
tbody tr:hover{background:var(--navy-50);}
tbody td.name-cell{color:var(--ink); font-weight:600;}

/* ---------- Detail drawer / modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(10,17,40,.45); z-index:100;
  display:flex; justify-content:flex-end; opacity:0; pointer-events:none; transition:opacity .2s ease;
}
.overlay.open{opacity:1; pointer-events:auto;}
.drawer{
  width:min(760px, 96vw); height:100vh; background:#fbfcfe; box-shadow:var(--shadow-lg);
  overflow-y:auto; transform:translateX(24px); transition:transform .22s ease;
}
.overlay.open .drawer{transform:translateX(0);}
.drawer-header{
  position:sticky; top:0; background:#fff; border-bottom:1px solid var(--line); z-index:5;
  padding:20px 26px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
}
.drawer-title{font-size:19px; font-weight:700; color:var(--ink); letter-spacing:-.01em;}
.drawer-sub{font-size:12.5px; color:var(--ink-soft); margin-top:4px;}
.drawer-close{
  border:none; background:#f1f3f9; width:32px; height:32px; border-radius:9px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--ink-soft); flex:0 0 auto;
}
.drawer-close:hover{background:#e6e9f3;}
.drawer-body{padding:22px 26px 60px;}
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px; overflow-x:auto;}
.tab-btn{
  padding:10px 14px; font-size:13px; font-weight:600; color:var(--ink-faint); background:none; border:none;
  cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
}
.tab-btn.active{color:var(--navy-800); border-bottom-color:var(--navy-700);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.info-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; margin-bottom:6px;}
@media (max-width:600px){.info-grid{grid-template-columns:1fr;}}
.info-item{padding:10px 0; border-bottom:1px solid #f0f2f8;}
.info-label{font-size:11px; color:var(--ink-faint); font-weight:650; text-transform:uppercase; letter-spacing:.03em;}
.info-value{font-size:13.5px; color:var(--ink); margin-top:3px; line-height:1.45;}
.info-value a{color:var(--navy-600); text-decoration:none;}
.info-value a:hover{text-decoration:underline;}

.intel-section{margin-bottom:16px;}
.intel-head{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.intel-icon{width:26px;height:26px;border-radius:7px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
.intel-title{font-size:13px; font-weight:650; color:var(--ink);}
.intel-list{margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:6px;}
.intel-list li{
  font-size:13px; color:var(--ink-soft); line-height:1.5; padding:9px 12px; background:#fff;
  border:1px solid var(--line); border-radius:9px; position:relative; padding-left:26px;
}
.intel-list li::before{content:"→"; position:absolute; left:10px; color:var(--navy-500); font-weight:700;}

.rec-card{background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
.rec-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
.rec-name{font-size:13.5px; font-weight:650; color:var(--navy-800);}
.rec-row{font-size:12.5px; color:var(--ink-soft); margin-top:4px; line-height:1.5;}
.rec-row b{color:var(--ink); font-weight:600;}
.rec-starter{margin-top:8px; padding:8px 10px; background:var(--navy-50); border-radius:8px; font-size:12.5px; color:var(--navy-800); font-style:italic;}

.pitch-box{background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; font-size:13.5px; line-height:1.65; color:var(--ink-soft); margin-bottom:14px;}
.flow-list{margin:0; padding-left:20px; font-size:13px; color:var(--ink-soft); line-height:1.8;}

.dq-list{display:flex; flex-direction:column; gap:8px;}
.dq-item{background:#fff; border:1px solid var(--line); border-radius:9px; padding:10px 14px; font-size:13px; color:var(--ink); display:flex; gap:10px; align-items:flex-start;}
.dq-num{flex:0 0 auto; width:20px; height:20px; border-radius:6px; background:var(--navy-100); color:var(--navy-700); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-top:1px;}

.contact-mini{background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px;}
.contact-mini-name{font-size:13px; font-weight:650; color:var(--ink);}
.contact-mini-role{font-size:12px; color:var(--navy-600); font-weight:500; margin-top:1px;}
.contact-mini-meta{font-size:11.5px; color:var(--ink-faint); margin-top:5px; line-height:1.5;}

.empty-state{text-align:center; padding:60px 20px; color:var(--ink-faint);}
.empty-state svg{width:48px;height:48px; margin-bottom:12px; opacity:.5;}

.badge{display:inline-block; font-size:10.5px; font-weight:650; padding:3px 8px; border-radius:6px;}
.badge-good{background:#e5f6ee; color:var(--good);}
.badge-warn{background:#fbf1de; color:var(--warn);}
.badge-bad{background:#fbeaea; color:var(--bad);}
.badge-neutral{background:#eef1f9; color:var(--navy-700);}

.chart-card{background:#fff; border:1px solid var(--line); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow-sm);}
.chart-wrap{position:relative; height:260px;}
.chart-wrap.tall{height:320px;}

.mini-list{display:flex; flex-direction:column; gap:2px;}
.mini-list-item{
  display:flex; align-items:center; justify-content:space-between; padding:9px 4px;
  border-bottom:1px solid #f0f2f8; font-size:13px; cursor:pointer; border-radius:6px;
}
.mini-list-item:hover{background:var(--navy-50);}
.mini-list-item:last-child{border-bottom:none;}
.mini-name{color:var(--ink); font-weight:550;}
.mini-sub{color:var(--ink-faint); font-size:11.5px;}

@media (max-width:820px){
  .sidebar{position:fixed; left:-236px; z-index:200; transition:left .2s ease;}
  .sidebar.open{left:0;}
  .content{padding:20px 14px 60px;}
  .topbar{padding:12px 14px;}
  .menu-btn{display:flex !important;}
}
.menu-btn{display:none; border:none; background:#fff; border:1px solid var(--line); width:36px;height:36px;border-radius:9px; align-items:center; justify-content:center; cursor:pointer;}

</style>
</head>

/* ============================================================
   Dexian Sales Intelligence Engine
   Pure, deterministic rule functions. Nothing here is keyed off
   a specific company name — every output is derived from the
   record's own fields (industry, size, tech stack, revenue).
   ============================================================ */

function industryGroup(company) {
  const blob = ((company.industry || '') + ' ' + (company.subIndustry || '') + ' ' + (company.companyName || '')).toLowerCase();
  const test = (arr) => arr.some(k => blob.includes(k));
  if (test(['hospital', 'health', 'medic', 'clinic'])) return 'Healthcare & Hospitals';
  if (test(['biotech', 'pharma', 'biopharma', 'life sciences'])) return 'Biotech & Pharma';
  if (test(['bank', 'finance'])) return 'Banking & Financial Services';
  if (test(['university', 'institute', 'school', 'learning', 'techno services', 'education'])) return 'Education';
  if (test(['electronics', 'semiconductor', 'aeronautics', 'defence', 'defense'])) return 'Electronics & Technology';
  if (test(['auto', 'motor', 'vehicle', 'tyres', 'tires', 'tractor', 'transportation'])) return 'Automotive & Manufacturing';
  if (test(['engineering', 'industrial', 'siemens', 'abb'])) return 'Industrial & Engineering';
  return company.industry ? company.industry : 'Unclassified';
}

function revenueBand(revenueUsdM) {
  if (revenueUsdM == null) return 'Undisclosed';
  if (revenueUsdM < 10) return '< $10M';
  if (revenueUsdM < 100) return '$10M - $100M';
  if (revenueUsdM < 500) return '$100M - $500M';
  if (revenueUsdM < 1000) return '$500M - $1B';
  return '$1B+';
}

function employeeBand(count) {
  if (count == null) return 'Undisclosed';
  if (count < 500) return '< 500';
  if (count < 2000) return '500 - 2,000';
  if (count < 10000) return '2,000 - 10,000';
  return '10,000+';
}

function isLargeEnterprise(company) {
  return (company.employeeCount || 0) >= 5000 || (company.revenueUsdM || 0) >= 500;
}

function hasTech(company, keyword) {
  const blob = ((company.techNotes || '') + ' ' + (company.techStack || []).join(' ')).toLowerCase();
  return blob.includes(keyword.toLowerCase());
}

function generateRecommendations(company, limit) {
  const recs = CAPABILITY_LIBRARY.filter(cap => cap.match(company)).map(cap => ({
    capability: cap.key,
    why: cap.why(company),
    problem: cap.problem,
    value: cap.value,
    starter: typeof cap.starter === 'function' ? cap.starter(company) : cap.starter,
  }));
  return typeof limit === 'number' ? recs.slice(0, limit) : recs;
}

function generateDiscoveryQuestions(company) {
  const specific = DISCOVERY_BANK[industryGroup(company)] || [];
  const combined = specific.concat(GENERIC_DISCOVERY);
  const seen = new Set();
  const out = [];
  combined.forEach(q => {
    if (!seen.has(q)) { seen.add(q); out.push(q); }
  });
  return out.slice(0, 9);

function generateClientPitch(company) {
  const recs = generateRecommendations(company, 3);
  const group = industryGroup(company);
  const capList = recs.map(r => r.capability).join(', ');
  const pitch = `${company.companyName} operates in ${group}${company.employeeCount ? `, with roughly ${company.employeeCount.toLocaleString()} employees` : ''}${company.revenueUsdM ? ` and approximately $${company.revenueUsdM.toLocaleString()}M in annual revenue` : ''}. `

    + `We'd recommend opening the conversation with ${recs[0] ? recs[0].capability : 'Digital Transformation'}, since it addresses ${recs[0] ? recs[0].problem.toLowerCase() : 'a common modernization gap'} and creates a natural bridge into the other priority areas. `

    `Introduce Dexian's relevant capability set: ${capList}`,
    'Share 1-2 relevant case studies or proof points for the sector',
    'Ask 2-3 tailored discovery questions to validate fit',
    'Propose a clear next step (technical workshop, roadmap session, or pilot scoping)',
  ];

  return { pitch, meetingFlow, topCapabilities: recs.map(r => r.capability) };
}

<script>
/* ============================================================
   Dexian Sales Intelligence Portal — App logic
   ============================================================ */
(function(){
  const COMPANIES = DATA.companies;
  const CONTACTS = DATA.contacts;
  const companyById = {};
  COMPANIES.forEach(c => companyById[c.id] = c);
  const contactsByCompany = {};
  CONTACTS.forEach(ct => {
    if (ct.matchedCompanyId) {
      (contactsByCompany[ct.matchedCompanyId] = contactsByCompany[ct.matchedCompanyId] || []).push(ct);
    }
  });

  const PALETTE = ['#274b8f','#3562b8','#6f8fce','#9db4dd','#c6d3ec','#0f1c3f','#b3730d','#8890ab'];

  const state = {
    view: 'dashboard',
    viewMode: 'card',
    search: '',
    filters: { industry:'', state:'', district:'', revenueBand:'', employeeBand:'', tech:'', source:'', keyword:'' },
    drawerCompanyId: null,
    drawerTab: 'overview',
    contactSearch: '',
  };

  /* ---------------- helpers ---------------- */
  function esc(s){
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function nl2br(s){ return esc(s).replace(/\n/g, '<br>'); }
  function fmtMoney(m){
    if (m == null) return '—';
    if (m >= 1000) return '$' + (m/1000).toFixed(2).replace(/\.00$/,'') + 'B';
    return '$' + m.toLocaleString() + 'M';
  }
  function fmtNum(n){ return n == null ? '—' : n.toLocaleString(); }
  function priorityColor(score){
    if (score == null) return '#b9c1dd';
    if (score >= 80) return '#1a8f5e';
    if (score >= 60) return '#3562b8';
    if (score >= 40) return '#b3730d';
    return '#8890ab';
  }
  function industryColor(group){
    const groups = uniqueIndustryGroups();
    const idx = groups.indexOf(group);
    return PALETTE[idx % PALETTE.length];
  }
  function uniqueIndustryGroups(){
    const s = new Set(COMPANIES.map(c => industryGroup(c)));
    return Array.from(s).sort();
  }
  function matchesSearch(c, q){
    if (!q) return true;
    const blob = [c.companyName, c.industry, c.subIndustry, c.description, c.city, c.district, c.state, c.techNotes, c.leadership].join(' ').toLowerCase();
    return blob.includes(q.toLowerCase());
  }
  function applyFilters(list){
    const f = state.filters;
    return list.filter(c => {
      if (f.industry && industryGroup(c) !== f.industry) return false;
      if (f.state && c.state !== f.state) return false;
      if (f.district && c.district !== f.district) return false;
      if (f.revenueBand && revenueBand(c.revenueUsdM) !== f.revenueBand) return false;
      if (f.employeeBand && employeeBand(c.employeeCount) !== f.employeeBand) return false;
      if (f.tech && !(c.techStack||[]).includes(f.tech) && !hasTech(c, f.tech)) return false;
      if (f.source && c.source !== f.source) return false;
      if (f.keyword && !matchesSearch(c, f.keyword)) return false;
      if (state.search && !matchesSearch(c, state.search)) return false;
      return true;
    });
  }

  /* ---------------- icons ---------------- */

  /* ---------------- layout shell ---------------- */
  function renderShell(){
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">DX</div>
          <div>
            <div class="brand-name">Dexian Intelligence</div>
            <div class="brand-sub">Sales Portal</div>
          </div>
        </div>
        <div class="nav">
          ${navItem('dashboard','Dashboard', ICONS.dashboard)}
          ${navItem('directory','Company Directory', ICONS.directory)}
          ${navItem('contacts','Contacts', ICONS.contacts)}
          ${navItem('analytics','Analytics', ICONS.analytics)}
        </div>
        <div class="sidebar-footer">
          ${COMPANIES.length} companies · ${CONTACTS.length} contacts<br>
          Built from your uploaded market-intelligence files.
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <button class="menu-btn" id="menuBtn">${ICONS.menu}</button>
          <h1 class="page-title" id="pageTitle"></h1>
          <div class="search-wrap">
            <span class="search-icon">${ICONS.search}</span>
            <input class="search-input" id="globalSearch" placeholder="Search companies, industries, tech, locations…" value="${esc(state.search)}">
          </div>
        </div>
        <div class="content" id="content"></div>
      </div>
      <div class="overlay" id="drawerOverlay">
        <div class="drawer" id="drawer"></div>
      </div>
    `;
    document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('globalSearch').oninput = (e) => { state.search = e.target.value; renderContent(); };
    document.getElementById('drawerOverlay').addEventListener('click', (e) => { if (e.target.id === 'drawerOverlay') closeDrawer(); });
  }

  function navItem(view, label, icon){
    return `<button class="nav-item ${state.view===view?'active':''}" data-view="${view}">${icon}<span>${label}</span></button>`;
  }

  function setView(v){
    state.view = v;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === v));
    renderContent();
    document.getElementById('sidebar').classList.remove('open');
  }

  document.addEventListener('click', (e) => {
    const nav = e.target.closest('.nav-item');
    if (nav) setView(nav.dataset.view);
  });

  /* ---------------- content router ---------------- */
  function renderContent(){
    const titles = {dashboard:'Dashboard', directory:'Company Directory', contacts:'Contacts', analytics:'Analytics'};
    document.getElementById('pageTitle').textContent = titles[state.view];
    const el = document.getElementById('content');
    if (state.view === 'dashboard') el.innerHTML = renderDashboard();
    if (state.view === 'directory') el.innerHTML = renderDirectory();
    if (state.view === 'contacts') el.innerHTML = renderContacts();
    if (state.view === 'analytics') el.innerHTML = renderAnalytics();
    wireContentEvents();
    if (state.view === 'dashboard') drawDashboardCharts();
    if (state.view === 'analytics') drawAnalyticsCharts();
  }

  /* ================= DASHBOARD ================= */
  function renderDashboard(){
    const total = COMPANIES.length;
    const researched = COMPANIES.filter(c => c.source !== 'Contact_List_Only').length;
    const industries = uniqueIndustryGroups().length;
    const avgPriority = Math.round(COMPANIES.filter(c=>c.priorityScore!=null).reduce((a,c)=>a+c.priorityScore,0) / (COMPANIES.filter(c=>c.priorityScore!=null).length||1));
    const topAccounts = COMPANIES.filter(c=>c.priorityScore!=null).sort((a,b)=>b.priorityScore-a.priorityScore).slice(0,8);
    const recent = COMPANIES.slice().reverse().slice(0,6);

    return `
      <div class="stat-grid">
        ${statCard('Total Companies', total, `${researched} with researched profiles`)}
        ${statCard('Industries Covered', industries, 'across Karnataka & Tamil Nadu')}
        ${statCard('Total Contacts', CONTACTS.length, `${CONTACTS.filter(c=>c.matchedCompanyId).length} linked to companies`)}
        ${statCard('Avg. Priority Score', avgPriority || '—', 'across scored accounts')}
      </div>
      <div class="grid-2">
        <div class="chart-card">
          <div class="panel-title">Companies by Industry</div>
          <div class="chart-wrap"><canvas id="chartIndustry"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-title">Top Potential Accounts</div>
          <div class="mini-list">
            ${topAccounts.map(c => `
              <div class="mini-list-item" data-open="${c.id}">
                <div>
                  <div class="mini-name">${esc(c.companyName)}</div>
                  <div class="mini-sub">${esc(industryGroup(c))} · ${esc(c.city || c.state || '')}</div>
                </div>
                <span class="badge" style="background:${priorityColor(c.priorityScore)}20; color:${priorityColor(c.priorityScore)}">${c.priorityScore}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="grid-2col">
        <div class="chart-card">
          <div class="panel-title">Revenue Distribution</div>
          <div class="chart-wrap"><canvas id="chartRevenue"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="panel-title">Employee Distribution</div>
          <div class="chart-wrap"><canvas id="chartEmployee"></canvas></div>
        </div>
      </div>
      <div class="grid-2">
        <div class="chart-card">
          <div class="panel-title">Companies by Location</div>
          <div class="chart-wrap"><canvas id="chartLocation"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-title">Recently Added</div>
          <div class="mini-list">
            ${recent.map(c => `
              <div class="mini-list-item" data-open="${c.id}">
                <div>
                  <div class="mini-name">${esc(c.companyName)}</div>
                  <div class="mini-sub">${esc(industryGroup(c))}</div>
                </div>
                <span class="mini-sub">${esc(sourceLabel(c.source))}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }

  function statCard(label, value, sub){
    return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${value}</div><div class="stat-sub">${sub}</div></div>`;
  }
  function sourceLabel(s){
    return ({Bengaluru_Auto_Healthcare_Prospects:'Bengaluru research', Karnataka_Auto_Healthcare_Prospects:'Karnataka research', Contact_List_Only:'Contact list'})[s] || s;
  }

  let charts = {};
  function destroyChart(id){ if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
  function countBy(list, fn){
    const m = {};
    list.forEach(x => { const k = fn(x) || 'Unknown'; m[k] = (m[k]||0)+1; });
    return m;
  }
  function barChart(ctxId, labels, data, colorFn, horizontal){
    if (typeof Chart === 'undefined') return;
    destroyChart(ctxId);
    const ctx = document.getElementById(ctxId);
    if (!ctx) return;
    charts[ctxId] = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: labels.map((l,i)=>colorFn?colorFn(l,i):PALETTE[i%PALETTE.length]), borderRadius:6, maxBarThickness:34 }] },
      options: {
        indexAxis: horizontal ? 'y' : 'x',
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{backgroundColor:'#0f1c3f', padding:10, cornerRadius:8} },
        scales:{ x:{grid:{display:!horizontal, color:'#eef0f7'}, ticks:{color:'#4a5170', font:{size:11}}}, y:{grid:{display:horizontal, color:'#eef0f7'}, ticks:{color:'#4a5170', font:{size:11}}} }
      }
    });
  }
  function doughnutChart(ctxId, labels, data){
    if (typeof Chart === 'undefined') return;
    destroyChart(ctxId);
    const ctx = document.getElementById(ctxId);
    if (!ctx) return;
    charts[ctxId] = new Chart(ctx, {
      type:'doughnut',
      data:{ labels, datasets:[{ data, backgroundColor: labels.map((l,i)=>PALETTE[i%PALETTE.length]), borderWidth:2, borderColor:'#fff' }]},
      options:{ responsive:true, maintainAspectRatio:false, cutout:'62%',
        plugins:{ legend:{position:'right', labels:{boxWidth:10, font:{size:11}, color:'#4a5170'}}, tooltip:{backgroundColor:'#0f1c3f', padding:10, cornerRadius:8} } }
    });
  }

  function drawDashboardCharts(){
    const byIndustry = countBy(COMPANIES, c => industryGroup(c));
    doughnutChart('chartIndustry', Object.keys(byIndustry), Object.values(byIndustry));

    const byRevenue = countBy(COMPANIES, c => revenueBand(c.revenueUsdM));
    const revOrder = ['< $10M','$10M - $100M','$100M - $500M','$500M - $1B','$1B+','Undisclosed'];
    barChart('chartRevenue', revOrder.filter(k=>byRevenue[k]), revOrder.filter(k=>byRevenue[k]).map(k=>byRevenue[k]));

    const byEmp = countBy(COMPANIES, c => employeeBand(c.employeeCount));
    const empOrder = ['< 500','500 - 2,000','2,000 - 10,000','10,000+','Undisclosed'];
    barChart('chartEmployee', empOrder.filter(k=>byEmp[k]), empOrder.filter(k=>byEmp[k]).map(k=>byEmp[k]));

    const byLoc = countBy(COMPANIES, c => c.city || c.state || 'Unknown');
    const locEntries = Object.entries(byLoc).sort((a,b)=>b[1]-a[1]).slice(0,8);
    barChart('chartLocation', locEntries.map(e=>e[0]), locEntries.map(e=>e[1]), null, true);
  }

  /* ================= DIRECTORY ================= */
  function filterOptions(field){
    const vals = new Set();
    COMPANIES.forEach(c => { if (c[field]) vals.add(c[field]); });
    return Array.from(vals).sort();
  }

  function renderDirectory(){
    const filtered = applyFilters(COMPANIES);
    const industries = uniqueIndustryGroups();
    const states = filterOptions('state');
    const districts = filterOptions('district');
    const sources = filterOptions('source');
    const techs = Array.from(new Set(COMPANIES.flatMap(c => c.techStack||[]))).sort();

    return `
      <div class="directory-layout">
        <div class="filters-panel">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
            <div class="filter-label" style="margin:0;">Filters</div>
            <button class="clear-filters" id="clearFilters">Clear all</button>
          </div>
          ${selectFilter('industry','Industry', industries)}
          ${selectFilter('state','State', states)}
          ${selectFilter('district','District', districts)}
          ${selectFilter('revenueBand','Revenue', ['< $10M','$10M - $100M','$100M - $500M','$500M - $1B','$1B+','Undisclosed'])}
          ${selectFilter('employeeBand','Employee Count', ['< 500','500 - 2,000','2,000 - 10,000','10,000+','Undisclosed'])}
          ${selectFilter('source','Company Status / Source', sources, sourceLabel)}
          <div class="filter-group">
            <label class="filter-label">Technology / ERP / CRM / Cloud</label>
            <div class="chip-row">
              ${techs.map(t => `<span class="chip ${state.filters.tech===t?'active':''}" data-tech="${esc(t)}">${esc(t)}</span>`).join('')}
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">Keyword</label>
            <input class="filter-input" id="keywordFilter" placeholder="e.g. ERP, cloud, hospital…" value="${esc(state.filters.keyword)}">
          </div>
        </div>
        <div>
          <div class="toolbar">
            <div class="result-count">${filtered.length} of ${COMPANIES.length} companies</div>
            <div class="view-toggle">
              <button data-mode="card" class="${state.viewMode==='card'?'active':''}">Cards</button>
              <button data-mode="table" class="${state.viewMode==='table'?'active':''}">Table</button>
            </div>
          </div>
          ${filtered.length===0 ? emptyState('No companies match your filters', 'Try clearing a filter or adjusting your search.') :
            (state.viewMode==='card' ? renderCompanyGrid(filtered) : renderCompanyTable(filtered))}
        </div>
      </div>
    `;
  }

  function selectFilter(key, label, options, labelFn){
    return `
      <div class="filter-group">
        <label class="filter-label">${label}</label>
        <select class="filter-select" data-filter="${key}">
          <option value="">All</option>
          ${options.map(o => `<option value="${esc(o)}" ${state.filters[key]===o?'selected':''}>${esc(labelFn?labelFn(o):o)}</option>`).join('')}
        </select>
      </div>`;
  }

  function emptyState(title, sub){
    return `<div class="empty-state">${ICONS.search}<div style="font-weight:650; color:var(--ink); margin-bottom:4px;">${title}</div><div>${sub}</div></div>`;
  }

  function renderCompanyGrid(list){
    return `<div class="company-grid">${list.map(companyCard).join('')}</div>`;
  }

  function companyCard(c){
    const group = industryGroup(c);
    return `
      <div class="company-card" data-open="${c.id}">
        <div class="card-top">
          <div>
            <div class="card-name">${esc(c.companyName)}</div>
            <div class="card-industry">${esc(group)}</div>
          </div>
          ${c.priorityScore!=null ? `<div class="priority-badge" style="background:${priorityColor(c.priorityScore)}">${c.priorityScore}</div>` : ''}
        </div>
        <div class="card-meta">
          ${c.city || c.state ? `<span class="meta-pill">${esc(c.city || c.state)}</span>` : ''}
          ${c.revenueUsdM ? `<span class="meta-pill">${fmtMoney(c.revenueUsdM)}</span>` : ''}
          ${c.employeeCount ? `<span class="meta-pill">${fmtNum(c.employeeCount)} emp.</span>` : ''}
        </div>
        ${c.description ? `<div class="card-desc">${esc(c.description)}</div>` : (c.source==='Contact_List_Only' ? `<div class="card-desc" style="color:var(--ink-faint)">Contact-list company — no researched profile yet.</div>` : '')}
        ${(c.techStack||[]).length ? `<div class="card-tags">${c.techStack.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>`;
  }

  function renderCompanyTable(list){
    return `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Company</th><th>Industry</th><th>Location</th><th>Revenue</th><th>Employees</th><th>Priority</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${list.map(c => `
              <tr data-open="${c.id}">
                <td class="name-cell">${esc(c.companyName)}</td>
                <td>${esc(industryGroup(c))}</td>
                <td>${esc(c.city || c.state || '—')}</td>
                <td>${fmtMoney(c.revenueUsdM)}</td>
                <td>${fmtNum(c.employeeCount)}</td>
                <td>${c.priorityScore!=null ? c.priorityScore : '—'}</td>
                <td>${esc(sourceLabel(c.source))}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  /* ================= CONTACTS ================= */
  function renderContacts(){
    const q = state.contactSearch.toLowerCase();
    const list = CONTACTS.filter(ct => !q || [ct.fullName, ct.company, ct.designation, ct.location, ct.email].join(' ').toLowerCase().includes(q));
    return `
      <div class="panel" style="margin-bottom:16px;">
        <input class="filter-input" id="contactSearch" placeholder="Search contacts by name, company, title, location…" value="${esc(state.contactSearch)}">
      </div>
      <div class="result-count" style="margin-bottom:10px;">${list.length} of ${CONTACTS.length} contacts</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Designation</th><th>Company</th><th>Location</th><th>Email</th><th>Phone</th><th>Status</th></tr></thead>
          <tbody>
            ${list.map(ct => `
              <tr ${ct.matchedCompanyId ? `data-open="${ct.matchedCompanyId}"` : ''}>
                <td class="name-cell">${esc(ct.fullName)}</td>
                <td>${esc(ct.designation)}</td>
                <td>${esc(ct.company)}</td>
                <td>${esc(ct.location)}</td>
                <td>${esc(ct.email)}</td>
                <td>${esc(ct.phone)}</td>
                <td>${esc(ct.contactStatus || ct.enrichedSourced || '—')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  /* ================= ANALYTICS ================= */
  function renderAnalytics(){
    const leaderboard = COMPANIES.filter(c=>c.priorityScore!=null).sort((a,b)=>b.priorityScore-a.priorityScore).slice(0,12);
    return `
      <div class="grid-2col">
        <div class="chart-card"><div class="panel-title">Companies by Industry</div><div class="chart-wrap"><canvas id="acIndustry"></canvas></div></div>
        <div class="chart-card"><div class="panel-title">Companies by Location</div><div class="chart-wrap"><canvas id="acLocation"></canvas></div></div>
      </div>
      <div class="grid-2col">
        <div class="chart-card"><div class="panel-title">Companies by Revenue</div><div class="chart-wrap"><canvas id="acRevenue"></canvas></div></div>
        <div class="chart-card"><div class="panel-title">Companies by Employee Size</div><div class="chart-wrap"><canvas id="acEmployee"></canvas></div></div>
      </div>
      <div class="chart-card" style="margin-bottom:18px;">
        <div class="panel-title">Recommended Dexian Capabilities Across Portfolio</div>
        <div class="chart-wrap tall"><canvas id="acCapabilities"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">High-Priority Accounts Leaderboard</div>
        <div class="table-wrap" style="box-shadow:none; border:none;">
          <table>
            <thead><tr><th>#</th><th>Company</th><th>Industry</th><th>Priority</th><th>Confidence</th></tr></thead>
            <tbody>
              ${leaderboard.map((c,i) => `
                <tr data-open="${c.id}">
                  <td>${i+1}</td><td class="name-cell">${esc(c.companyName)}</td><td>${esc(industryGroup(c))}</td>
                  <td><span class="badge" style="background:${priorityColor(c.priorityScore)}20; color:${priorityColor(c.priorityScore)}">${c.priorityScore}</span></td>
                  <td>${c.confidenceScore!=null ? c.confidenceScore : '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function drawAnalyticsCharts(){
    const byIndustry = countBy(COMPANIES, c => industryGroup(c));
    doughnutChart('acIndustry', Object.keys(byIndustry), Object.values(byIndustry));
    const byLoc = countBy(COMPANIES, c => c.city || c.state || 'Unknown');
    const locEntries = Object.entries(byLoc).sort((a,b)=>b[1]-a[1]).slice(0,10);
    barChart('acLocation', locEntries.map(e=>e[0]), locEntries.map(e=>e[1]), null, true);
    const byRevenue = countBy(COMPANIES, c => revenueBand(c.revenueUsdM));
    const revOrder = ['< $10M','$10M - $100M','$100M - $500M','$500M - $1B','$1B+','Undisclosed'];
    barChart('acRevenue', revOrder.filter(k=>byRevenue[k]), revOrder.filter(k=>byRevenue[k]).map(k=>byRevenue[k]));
    const byEmp = countBy(COMPANIES, c => employeeBand(c.employeeCount));
    const empOrder = ['< 500','500 - 2,000','2,000 - 10,000','10,000+','Undisclosed'];
    barChart('acEmployee', empOrder.filter(k=>byEmp[k]), empOrder.filter(k=>byEmp[k]).map(k=>byEmp[k]));

    const capTally = {};
    COMPANIES.forEach(c => {
      generateRecommendations(c).forEach(r => { capTally[r.capability] = (capTally[r.capability]||0)+1; });
    });
    const capEntries = Object.entries(capTally).sort((a,b)=>b[1]-a[1]);
    barChart('acCapabilities', capEntries.map(e=>e[0]), capEntries.map(e=>e[1]), null, true);
  }

  /* ================= DRAWER (Company detail) ================= */
  function openDrawer(id){
    state.drawerCompanyId = id;
    state.drawerTab = 'overview';
    renderDrawer();
    document.getElementById('drawerOverlay').classList.add('open');
  }
  function closeDrawer(){
    document.getElementById('drawerOverlay').classList.remove('open');
  }
  function setDrawerTab(tab){
    state.drawerTab = tab;
    renderDrawer();
  }

  function renderDrawer(){
    const c = companyById[state.drawerCompanyId];
    const drawer = document.getElementById('drawer');
    if (!c) { drawer.innerHTML = ''; return; }
    const tabs = [
      ['overview','Overview'], ['intel','Sales Intelligence'], ['recs','Dexian Recommendations'],
      ['discovery','Discovery Qs'], ['pitch','Client Pitch'], ['contacts','Contacts']
    ];
    drawer.innerHTML = `
      <div class="drawer-header">
        <div>
          <div class="drawer-title">${esc(c.companyName)}</div>
          <div class="drawer-sub">${esc(industryGroup(c))} ${c.subIndustry ? '· ' + esc(c.subIndustry) : ''} ${c.city ? '· ' + esc(c.city) : (c.state ? '· '+esc(c.state) : '')}</div>
        </div>
        <button class="drawer-close" id="drawerCloseBtn">${ICONS.close}</button>
      </div>
      <div class="drawer-body">
        <div class="tabs">
          ${tabs.map(([k,l]) => `<button class="tab-btn ${state.drawerTab===k?'active':''}" data-tab="${k}">${l}</button>`).join('')}
        </div>
        <div id="drawerTabContent"></div>
      </div>
    `;
    document.getElementById('drawerCloseBtn').onclick = closeDrawer;
    drawer.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => setDrawerTab(btn.dataset.tab));
    document.getElementById('drawerTabContent').innerHTML = renderDrawerTab(c, state.drawerTab);
  }

  function renderDrawerTab(c, tab){
    if (tab === 'overview') return renderOverviewTab(c);
    if (tab === 'intel') return renderIntelTab(c);
    if (tab === 'recs') return renderRecsTab(c);
    if (tab === 'discovery') return renderDiscoveryTab(c);
    if (tab === 'pitch') return renderPitchTab(c);
    if (tab === 'contacts') return renderContactsTab(c);
    return '';
  }

  function infoItem(label, value){
    if (!value) return '';
    return `<div class="info-item"><div class="info-label">${label}</div><div class="info-value">${value}</div></div>`;
  }

  function renderOverviewTab(c){
    const websiteVal = c.website ? `<a href="https://${esc(c.website.replace(/^https?:\/\//,''))}" target="_blank" rel="noopener">${esc(c.website)}</a>` : '';
    return `
      ${c.description ? `<div class="panel" style="margin-bottom:16px;"><div class="panel-title">Company Description</div><div class="info-value">${esc(c.description)}</div></div>` : ''}
      <div class="info-grid">
        ${infoItem('Headquarters', esc(c.headquarters))}
        ${infoItem('Office Address', esc(c.address))}
        ${infoItem('City / Area', esc([c.city,c.area].filter(Boolean).join(' — ')))}
        ${infoItem('District / State', esc([c.district,c.state].filter(Boolean).join(', ')))}
        ${infoItem('PIN Code', esc(c.pinCode))}
        ${infoItem('Website', websiteVal)}
        ${infoItem('Annual Revenue', esc(c.revenueRaw))}
        ${infoItem('Revenue Source', esc(c.revenueSource))}
        ${infoItem('Employees', esc(c.employeesRaw))}
        ${infoItem('Year Founded', esc(c.yearFounded))}
        ${infoItem('Parent Company', esc(c.parentCompany))}
        ${infoItem('Leadership', esc(c.leadership))}
        ${infoItem('Official Email', esc(c.officialEmail))}
        ${infoItem('Phone', esc(c.phone))}
        ${infoItem('LinkedIn', c.linkedin ? esc(c.linkedin) : '')}
        ${infoItem('Technology / ERP / CRM / Cloud', esc(c.techNotes))}
        ${infoItem('Priority Score', c.priorityScore!=null ? c.priorityScore+' / 100' : '')}
        ${infoItem('Confidence Score', c.confidenceScore!=null ? c.confidenceScore+' / 100' : '')}
        ${infoItem('Recent News', esc(c.recentNews))}
        ${infoItem('Why a Good Prospect', esc(c.whyProspect))}
        ${infoItem('Suggested Approach', esc(c.approach))}
        ${infoItem('Business Challenges (source notes)', esc(c.businessChallengesRaw))}
        ${infoItem('Data Status / Caveats', esc(c.dataStatus))}
      </div>
      <div style="margin-top:6px; font-size:11.5px; color:var(--ink-faint);">Source file: ${esc(sourceLabel(c.source))} · Record ID: ${esc(c.id)}</div>
    `;
  }

  const INTEL_META = [
    ['businessChallenges','Possible Business Challenges', ICONS.challenge, '#274b8f'],
    ['itChallenges','Possible IT Challenges', ICONS.it, '#3562b8'],
    ['digitalTransformation','Digital Transformation Opportunities', ICONS.digital, '#0f1c3f'],
    ['ai','AI Opportunities', ICONS.ai, '#6f8fce'],
    ['cloudMigration','Cloud Migration Opportunities', ICONS.cloud, '#274b8f'],
    ['cybersecurity','Cybersecurity Opportunities', ICONS.security, '#b3730d'],
    ['dataAnalytics','Data Analytics Opportunities', ICONS.data, '#3562b8'],
    ['automation','Automation Opportunities', ICONS.automation, '#0f1c3f'],
  ];

  function renderIntelTab(c){
    const intel = generateSalesIntelligence(c);
    return INTEL_META.map(([key,label,icon,color]) => `
      <div class="intel-section">
        <div class="intel-head">
          <div class="intel-icon" style="background:${color}18; color:${color}">${icon}</div>
          <div class="intel-title">${label}</div>
        </div>
        <ul class="intel-list">${(intel[key]||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul>
      </div>
    `).join('');
  }

  function renderRecsTab(c){
    const recs = generateRecommendations(c);
    return `
      <div style="font-size:12.5px; color:var(--ink-faint); margin-bottom:12px;">Ranked by fit for this account, based on industry, size, and known technology footprint.</div>
      ${recs.map(r => `
        <div class="rec-card">
          <div class="rec-head"><div class="rec-name">${esc(r.capability)}</div></div>
          <div class="rec-row"><b>Why it fits:</b> ${esc(r.why)}</div>
          <div class="rec-row"><b>Business problem:</b> ${esc(r.problem)}</div>
          <div class="rec-row"><b>Expected value:</b> ${esc(r.value)}</div>
          <div class="rec-starter">"${esc(r.starter)}"</div>
        </div>
      `).join('')}
    `;
  }

  function renderDiscoveryTab(c){
    const qs = generateDiscoveryQuestions(c);
    return `<div class="dq-list">${qs.map((q,i) => `<div class="dq-item"><span class="dq-num">${i+1}</span><span>${esc(q)}</span></div>`).join('')}</div>`;
  }

  function renderPitchTab(c){
    const p = generateClientPitch(c);
    return `
      <div class="panel-title" style="margin-bottom:10px;">Suggested Client Pitch</div>
      <div class="pitch-box">${esc(p.pitch)}</div>
      <div class="panel-title" style="margin-bottom:10px;">Suggested Meeting Flow</div>
      <ol class="flow-list">${p.meetingFlow.map(m => `<li>${esc(m)}</li>`).join('')}</ol>
    `;
  }

  function renderContactsTab(c){
    const list = contactsByCompany[c.id] || [];
    if (!list.length) return emptyState('No named contacts on file', 'No contacts from your market-intelligence lists matched this company yet.');
    return list.map(ct => `
      <div class="contact-mini">
        <div class="contact-mini-name">${esc(ct.fullName)}</div>
        <div class="contact-mini-role">${esc(ct.designation)}</div>
        <div class="contact-mini-meta">
          ${esc(ct.location)}${ct.email ? ' · ' + esc(ct.email) : ''}${ct.phone && ct.phone!=='N/A' ? ' · ' + esc(ct.phone) : ''}
          ${ct.linkedin ? `<br><a href="${esc(ct.linkedin)}" target="_blank" rel="noopener" style="color:var(--navy-600)">${esc(ct.linkedin)}</a>` : ''}
        </div>
      </div>
    `).join('');
  }

  /* ---------------- event wiring for dynamically rendered content ---------------- */
  function wireContentEvents(){
    document.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', () => openDrawer(el.dataset.open));
    });
    document.querySelectorAll('[data-filter]').forEach(sel => {
      sel.addEventListener('change', () => { state.filters[sel.dataset.filter] = sel.value; renderContent(); });
    });
    document.querySelectorAll('[data-tech]').forEach(chip => {
      chip.addEventListener('click', () => {
        state.filters.tech = state.filters.tech === chip.dataset.tech ? '' : chip.dataset.tech;
        renderContent();
      });
    });
    const kw = document.getElementById('keywordFilter');
    if (kw) kw.addEventListener('input', (e) => { state.filters.keyword = e.target.value; renderContent(); });
    const clearBtn = document.getElementById('clearFilters');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      state.filters = { industry:'', state:'', district:'', revenueBand:'', employeeBand:'', tech:'', source:'', keyword:'' };
      renderContent();
    });
    document.querySelectorAll('[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => { state.viewMode = btn.dataset.mode; renderContent(); });
    });
    const cs = document.getElementById('contactSearch');
    if (cs) cs.addEventListener('input', (e) => { state.contactSearch = e.target.value; renderContent(); });
  }

  /* ---------------- init ---------------- */
  renderShell();
  renderContent();
})();

</script>

</body>
</html>
